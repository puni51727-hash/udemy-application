<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkillNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar" style="position: absolute; width: 100%; top: 0; background: transparent; box-shadow: none;">
        <a href="index.html" class="logo" style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            SkillNest
        </a>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <h2>Log in to your account</h2>
            <div id="alert-box" class="alert"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-block">Log in</button>
            </form>
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
                Don't have an account? <a href="register.html" style="font-weight: 600;">Sign up</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
