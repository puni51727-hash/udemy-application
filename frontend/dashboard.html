<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Learning - SkillNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            SkillNest
        </a>
        <div class="search-bar">
            <input type="text" placeholder="Search my courses...">
        </div>
        <ul class="nav-links" id="nav-links"></ul>
    </nav>

    <div class="container" style="min-height: 80vh; padding-top: 2rem;">
        <div class="dashboard-header">
            <h2 id="user-name">Welcome!</h2>
            <p>Ready to continue your learning journey?</p>
        </div>
        
        <h3 class="section-title" style="font-size: 1.5rem;">My Learning</h3>
        <div id="alert-box" class="alert"></div>
        <div id="enrolled-courses" class="course-grid" style="margin-top: 2rem;">
            <p>Loading your courses...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 SkillNest. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
